services:
  # ─────────────────────────────────────────
  # Node.js Backend (SQLite – embedded)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnaja_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env # loads ACCESS_SECRET, REFRESH_SECRET, PORT, etc.
    environment:
      DB_PATH: /app/database/learnaja.db # override path for inside the container
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost}
    ports:
      - "${PORT:-3200}:${PORT:-3200}"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/database:/app/database # bind-mount → access .db file directly on Windows

  # ─────────────────────────────────────────
  # React Frontend (Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3200}
    container_name: learnaja_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
