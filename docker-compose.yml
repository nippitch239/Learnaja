services:
  # ─────────────────────────────────────────
  # Node.js Backend (SQLite – embedded)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnaja_backend
    restart: unless-stopped
    environment:
      DB_PATH: /app/data/learnaja.db
      ACCESS_SECRET: ${ACCESS_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
      PORT: ${PORT:-3200}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost}
    ports:
      - "${PORT:-3200}:${PORT:-3200}"
    volumes:
      - ./backend/uploads:/app/uploads
      - sqlite_data:/app/data # persists the SQLite database file

  # ─────────────────────────────────────────
  # React Frontend (Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3200}
    container_name: learnaja_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  sqlite_data:
