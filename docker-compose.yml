services:
  # ─────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: learnaja_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/Dump20260224 (1).sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # Node.js Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnaja_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      ACCESS_SECRET: ${ACCESS_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
      PORT: ${PORT:-3200}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost}
    ports:
      - "${PORT:-3200}:${PORT:-3200}"
    volumes:
      - ./backend/uploads:/app/uploads

  # ─────────────────────────────────────────
  # React Frontend (Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3200}
    container_name: learnaja_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
